<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotoscope Animation - MMA Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #100611 0%, #050205 38%, #010001 100%);
            color: #f4c2c2;
            overflow-y: auto;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(244, 194, 194, 0.14) 0%, transparent 18%),
                radial-gradient(circle at 82% 30%, rgba(244, 194, 194, 0.08) 0%, transparent 16%),
                radial-gradient(circle at 50% 80%, rgba(244, 194, 194, 0.1) 0%, transparent 22%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '✦';
            position: fixed;
            top: 20px;
            right: 28px;
            font-size: 34px;
            color: rgba(244, 194, 194, 0.35);
            opacity: 0.8;
            animation: drift 12s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header-container {
            width: 100%;
        }

        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .page-container {
            max-width: 1000px;
            width: 100%;
            animation: slideIn 0.8s ease-out;
        }

        h1 {
            font-size: 50px;
            color: #f4c2c2;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(244, 194, 194, 0.35);
            text-align: center;
            letter-spacing: 3px;
            font-weight: 900;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(244, 194, 194, 0.25);
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
            transition: all 0.4s ease;
            border-radius: 24px;
        }

        .section:hover {
            background: rgba(244, 194, 194, 0.08);
            border-color: rgba(244, 194, 194, 0.45);
            box-shadow: 0 20px 50px rgba(244, 194, 194, 0.12);
        }

        .section h2 {
            color: #f4c2c2;
            font-size: 28px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(244, 194, 194, 0.3);
            padding-bottom: 10px;
        }

        .section p {
            color: #f8d8e1;
            line-height: 1.8;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .project-item {
            background: rgba(255, 255, 255, 0.04);
            border-left: 4px solid #f4c2c2;
            padding: 18px;
            margin: 15px 0;
            transition: all 0.4s ease;
            border-radius: 16px;
        }

        .project-item:hover {
            background: rgba(244, 194, 194, 0.08);
            box-shadow: 0 12px 30px rgba(244, 194, 194, 0.15);
            transform: translateX(6px);
        }

        .weekly-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }

        .weekly-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(244, 194, 194, 0.18);
            padding: 16px;
            border-radius: 18px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.36);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .weekly-card .project-title {
            color: #f4c2c2;
            font-size: 16px;
            margin-bottom: 0;
        }

        .weekly-card .responsive-iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 14px;
            border: 1px solid rgba(244, 194, 194, 0.18);
        }

        .project-title {
            color: #f4c2c2;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .project-desc {
            color: #f8d8e1;
            font-size: 14px;
        }

        .tech-tags {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(244, 194, 194, 0.2);
            color: #f4c2c2;
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 15px;
            font-weight: bold;
        }

        .responsive-iframe {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 18px;
            border: 1px solid rgba(244, 194, 194, 0.18);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes drift {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-16px) rotate(6deg);
            }
        }

        #footer-container {
            width: 100%;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }

            .section h2 {
                font-size: 22px;
            }
        }
    </style>
</head>

    <div id="footer-container"></div>

    <script>
        // Load header from header.html
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
                // Set active nav link after header is loaded
                const links = document.querySelectorAll('nav a.nav-link');
                const currentPage = window.location.pathname.split('/').pop() || 'home.html';
                links.forEach(link => {
                    if (link.getAttribute('href') === currentPage) {
                        link.classList.add('active');
                    }
                });
            });

        // Load footer from footer.html
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });
    </script>
