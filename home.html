<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMA Portfolio - Retro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fffef0 0%, #fff9e6 50%, #ffe8cc 100%);
            color: #8b6534;
            overflow: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Groovy floaty background elements */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 179, 71, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 107, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Hippie flower decoration */
        body::after {
            content: '🌼';
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 40px;
            opacity: 0.6;
            animation: float 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 10;
        }

        container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Container */
        #header-container {
            width: 100%;
        }

        /* Main content */
        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .hero {
            text-align: center;
            animation: slideIn 0.8s ease-out;
        }

        h1 {
            font-size: 60px;
            color: #d4845c;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(212, 132, 92, 0.2);
            animation: sway 3s ease-in-out infinite;
            letter-spacing: 3px;
            font-weight: 900;
        }

        .subtitle {
            font-size: 24px;
            color: #c75d3b;
            margin-bottom: 40px;
            text-shadow: none;
            letter-spacing: 2px;
            font-style: italic;
        }

        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            margin: 10px;
            font-size: 18px;
            color: #fff;
            background: linear-gradient(135deg, #ff9d5c 0%, #ffb347 100%);
            border: 3px solid #ff9d5c;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.4s ease;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(255, 157, 92, 0.3);
            border-radius: 25px;
        }

        .cta-button:hover {
            background: linear-gradient(135deg, #ff7b54 0%, #ff9d5c 100%);
            transform: translateY(-5px) rotate(2deg);
            box-shadow: 0 10px 30px rgba(255, 157, 92, 0.5);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 50px;
            max-width: 1200px;
        }

        .card {
            background: rgba(255, 182, 193, 0.3);
            border: 3px dashed #d4845c;
            padding: 30px;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(212, 132, 92, 0.15);
            border-radius: 20px;
        }

        .card:hover {
            background: rgba(255, 179, 71, 0.2);
            border-color: #ff9d5c;
            box-shadow: 0 12px 35px rgba(255, 157, 92, 0.35);
            transform: translateY(-8px) rotate(-1deg);
        }

        .card h3 {
            color: #c75d3b;
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        .card p {
            color: #8b6534;
            line-height: 1.6;
        }

        @keyframes sway {
            0%, 100% {
                transform: rotate(-2deg);
            }
            50% {
                transform: rotate(2deg);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Footer Container */
        #footer-container {
            width: 100%;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 40px;
            }

            .subtitle {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <container>

        <div class="content">
            <div class="hero">
                <h1>MMA PORTFOLIO</h1>
                <p class="subtitle">> WELCOME TO THE RETRO ZONE</p>
                
                <div class="grid-container">
                    <div class="card">
                        <h3>3D ANIMATION</h3>
                        <p>Explore cutting-edge 3D animation projects and visual effects</p>
                    </div>
                    <div class="card">
                        <h3>ROTOSCOPE</h3>
                        <p>Discover detailed frame-by-frame animation techniques</p>
                    </div>
                    <div class="card">
                        <h3>ABOUT ME</h3>
                        <p>Learn more about my background and creative journey</p>
                    </div>
                </div>
            </div>
        </div>
    </container>
    <div id="footer-container"></div>

    <script>
        // Load header from header.html
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
                // Set active nav link after header is loaded
                const links = document.querySelectorAll('nav a.nav-link');
                const currentPage = window.location.pathname.split('/').pop() || 'home.html';
                links.forEach(link => {
                    if (link.getAttribute('href') === currentPage) {
                        link.classList.add('active');
                    }
                });
            });

        // Load footer from footer.html
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });
    </script>
</body>
</html>
