<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTIMEDIA & AUTHORING</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root{
            --pastel-pink: #f4c2c2;
            --pastel-lavender: #cdb4db;
            --pastel-mint: #c8f7d6;
            --pastel-peach: #ffd7c2;
            --pastel-sky: #cfe9ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #100611 0%, #050205 38%, #010001 100%);
            color: var(--pastel-pink);
            overflow-y: auto;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 18%, rgba(205,180,219,0.14) 0%, transparent 20%),
                radial-gradient(circle at 80% 25%, rgba(200,247,214,0.08) 0%, transparent 18%),
                radial-gradient(circle at 50% 80%, rgba(207,233,255,0.1) 0%, transparent 25%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '✦ ✧ ✶';
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 30px;
            color: rgba(205,180,219,0.35);
            opacity: 0.8;
            animation: drift 12s linear infinite;
            pointer-events: none;
            z-index: 0;
            letter-spacing: 0.35em;
        }

        container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header-container {
            width: 100%;
        }

        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .hero {
            text-align: center;
            animation: slideIn 0.8s ease-out;
            width: 100%;
            max-width: 1100px;
        }

        h1 {
            font-size: 128px;
            color: var(--pastel-lavender);
            margin-bottom: 18px;
            text-shadow: 0 0 30px rgba(205,180,219,0.4), 0 0 60px rgba(205,180,219,0.2);
            letter-spacing: 4px;
            font-weight: 900;
            animation: pastelPulse 10s ease-in-out infinite alternate;
        }

        .subtitle {
            font-size: 22px;
            color: var(--pastel-peach);
            margin-bottom: 40px;
            letter-spacing: 2px;
            font-style: italic;
        }

        .cta-button {
            display: inline-block;
            padding: 15px 38px;
            margin: 10px;
            font-size: 18px;
            color: #100a14;
            background: var(--pastel-peach);
            border: 1px solid rgba(255,215,200,0.9);
            cursor: pointer;
            font-weight: 800;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            box-shadow: 0 12px 30px rgba(205,180,219,0.18);
            border-radius: 28px;
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(205,180,219,0.28);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 28px;
            margin-top: 50px;
            max-width: 1200px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(205,180,219,0.12);
            padding: 32px;
            text-align: center;
            transition: all 0.35s ease;
            cursor: default;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
            border-radius: 26px;
            min-height: 210px;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(205,180,219,0.45);
            box-shadow: 0 20px 55px rgba(205,180,219,0.08);
        }

        .card h3 {
            color: var(--pastel-pink);
            margin-bottom: 18px;
            font-size: 24px;
            font-weight: 800;
        }

        .card p {
            color: #f9d8e0;
            line-height: 1.75;
            font-size: 16px;
            margin-bottom: 24px;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 22px;
            font-size: 15px;
            color: #100a14;
            background: var(--pastel-peach);
            text-decoration: none;
            border-radius: 999px;
            font-weight: 800;
            transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
            box-shadow: 0 10px 24px rgba(205,180,219,0.16);
        }

        .card-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(205,180,219,0.24);
            opacity: 0.95;
        }

        .card-link span {
            margin-left: 10px;
            font-size: 16px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pastelPulse {
            0% { color: var(--pastel-lavender); text-shadow: 0 0 28px rgba(205,180,219,0.28); }
            25% { color: var(--pastel-peach); text-shadow: 0 0 28px rgba(255,215,200,0.35); }
            50% { color: var(--pastel-sky); text-shadow: 0 0 28px rgba(207,233,255,0.35); }
            75% { color: var(--pastel-mint); text-shadow: 0 0 28px rgba(200,247,214,0.35); }
            100% { color: var(--pastel-pink); text-shadow: 0 0 28px rgba(244,194,194,0.35); }
        }

        @keyframes drift {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-18px) rotate(5deg);
            }
        }

        #footer-container {
            width: 100%;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 42px;
            }

            .subtitle {
                font-size: 18px;
                margin-bottom: 28px;
            }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <container>

        <div class="content">
            <div class="hero">
                <h1>MULTIMEDIA & AUTHORING</h1>
                
                <div class="grid-container">
                    <div class="card">
                        <h3>3D ANIMATION</h3>
                        <p>Scripting 3d animation using Python language to animate the Solar System and its Planets</p>
                        <a class="card-link" href="3d-animation.html">View <span>→</span></a>
                    </div>
                    <div class="card">
                        <h3>ROTOSCOPE</h3>
                        <p>Discover detailed frame-by-frame animation techniques using Adobe After Effects</p>
                        <a class="card-link" href="rotoscope-animation.html">View <span>→</span></a>
                    </div>
                </div>
            </div>
        </div>
    </container>
    <div id="footer-container"></div>

    <script>
        // Load header from header.html
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
                // Set active nav link after header is loaded
                const links = document.querySelectorAll('nav a.nav-link');
                const currentPage = window.location.pathname.split('/').pop() || 'home.html';
                links.forEach(link => {
                    if (link.getAttribute('href') === currentPage) {
                        link.classList.add('active');
                    }
                });
            });

        // Load footer from footer.html
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });
    </script>
</body>
</html>
