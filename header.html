<style>
    :root{
        --pastel-pink: #f4c2c2;
        --pastel-lavender: #cdb4db;
        --pastel-mint: #c8f7d6;
        --pastel-peach: #ffd7c2;
        --pastel-sky: #cfe9ff;
        --nav-bg: rgba(8,8,12,0.88);
        --nav-fg: rgba(255,255,255,0.95);
    }

    /* Navigation Menu */
    nav {
        background: var(--nav-bg);
        border-bottom: 1px solid rgba(255,255,255,0.04);
        padding: 18px 0;
        backdrop-filter: blur(12px);
        position: relative;
        z-index: 10;
    }

    nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    nav a {
        position: relative;
        color: var(--pastel-pink);
        text-decoration: none;
        font-size: 16px;
        font-weight: 700;
        padding: 10px 22px;
        border-radius: 18px;
        transition: all 0.28s ease;
        cursor: pointer;
        display: inline-block;
        background: transparent;
        border: 2px solid rgba(244,194,194,0.45);
        box-shadow: none;
    }

    nav a:hover,
    nav a.active {
        color: #100a14;
        background: var(--pastel-pink);
        border-color: transparent;
        transform: translateY(-3px);
        box-shadow: 0 10px 22px rgba(244,194,194,0.25);
        animation: navPulse 10s ease-in-out infinite alternate;
    }

    @keyframes navPulse {
        0% { background: #f4c2c2; box-shadow: 0 10px 22px rgba(244,194,194,0.25); }
        25% { background: #ffd7c2; box-shadow: 0 10px 24px rgba(255,215,200,0.3); }
        50% { background: #cfe9ff; box-shadow: 0 10px 24px rgba(207,233,255,0.3); }
        75% { background: #c8f7d6; box-shadow: 0 10px 24px rgba(200,247,214,0.3); }
        100% { background: #f4c2c2; box-shadow: 0 10px 22px rgba(244,194,194,0.25); }
    }

    /* Make outlines slightly thicker on larger screens */
    @media (min-width: 1200px) {
        nav a { border-width: 3px; padding: 12px 26px; }
    }

    @media (max-width: 768px) {
        nav a {
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 20px;
        }

        nav ul {
            gap: 16px;
        }
    }
</style>

<script>
    // Set active navigation link based on current page
    function setActiveNavLink() {
        const links = document.querySelectorAll('nav a.nav-link');
        const currentPage = window.location.pathname.split('/').pop() || 'home.html';
        
        links.forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }
    
    // Call on page load
    document.addEventListener('DOMContentLoaded', setActiveNavLink);
</script>
