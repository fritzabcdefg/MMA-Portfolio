<style>
    /* Navigation Menu */
    nav {
        background: rgba(0, 0, 0, 0.75);
        border-bottom: 1px solid rgba(244, 194, 194, 0.25);
        padding: 22px 0;
        backdrop-filter: blur(10px);
        position: relative;
        z-index: 10;
    }

    nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 22px;
        flex-wrap: wrap;
    }

    nav a {
        color: #f4c2c2;
        text-decoration: none;
        font-size: 17px;
        font-weight: 700;
        padding: 12px 26px;
        border: 1px solid rgba(244, 194, 194, 0.5);
        border-radius: 24px;
        transition: all 0.3s ease;
        cursor: pointer;
        display: inline-block;
        background: rgba(244, 194, 194, 0.08);
        text-shadow: 0 0 8px rgba(244, 194, 194, 0.25);
    }

    nav a:hover {
        background: rgba(244, 194, 194, 0.35);
        color: #100a14;
        border-color: rgba(244, 194, 194, 0.85);
        transform: scale(1.02);
        box-shadow: 0 10px 25px rgba(244, 194, 194, 0.22);
    }

    nav a.active {
        background: #f4c2c2;
        color: #100a14;
        border-color: #f4c2c2;
        box-shadow: 0 10px 25px rgba(244, 194, 194, 0.35);
    }

    @media (max-width: 768px) {
        nav a {
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 20px;
        }

        nav ul {
            gap: 16px;
        }
    }
</style>

<script>
    // Set active navigation link based on current page
    function setActiveNavLink() {
        const links = document.querySelectorAll('nav a.nav-link');
        const currentPage = window.location.pathname.split('/').pop() || 'home.html';
        
        links.forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }
    
    // Call on page load
    document.addEventListener('DOMContentLoaded', setActiveNavLink);
</script>
