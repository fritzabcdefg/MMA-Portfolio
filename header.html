<style>
    /* Navigation Menu */
    nav {
        background: rgba(8, 8, 12, 0.88);
        border-bottom: 1px solid rgba(244, 194, 194, 0.18);
        padding: 18px 0;
        backdrop-filter: blur(12px);
        position: relative;
        z-index: 10;
    }

    nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    nav a {
        color: #f4c2c2;
        text-decoration: none;
        font-size: 16px;
        font-weight: 700;
        padding: 10px 22px;
        border: 1px solid rgba(244, 194, 194, 0.25);
        border-radius: 18px;
        transition: all 0.25s ease;
        cursor: pointer;
        display: inline-block;
        background: rgba(244, 194, 194, 0.06);
    }

    nav a:hover {
        background: rgba(244, 194, 194, 0.14);
        color: #fff;
        border-color: rgba(244, 194, 194, 0.45);
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgba(244, 194, 194, 0.12);
    }

    nav a.active {
        background: rgba(244, 194, 194, 0.2);
        color: #fff;
        border-color: rgba(244, 194, 194, 0.55);
        box-shadow: 0 10px 24px rgba(244, 194, 194, 0.16);
    }

    @media (max-width: 768px) {
        nav a {
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 20px;
        }

        nav ul {
            gap: 16px;
        }
    }
</style>

<script>
    // Set active navigation link based on current page
    function setActiveNavLink() {
        const links = document.querySelectorAll('nav a.nav-link');
        const currentPage = window.location.pathname.split('/').pop() || 'home.html';
        
        links.forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }
    
    // Call on page load
    document.addEventListener('DOMContentLoaded', setActiveNavLink);
</script>
