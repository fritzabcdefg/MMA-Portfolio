<style>
    :root{
        --pastel-pink: #f4c2c2;
        --pastel-lavender: #cdb4db;
        --pastel-mint: #c8f7d6;
        --pastel-peach: #ffd7c2;
        --pastel-sky: #cfe9ff;
        --nav-bg: rgba(8,8,12,0.88);
        --nav-fg: rgba(255,255,255,0.95);
    }

    /* Navigation Menu */
    nav {
        background: var(--nav-bg);
        border-bottom: 1px solid rgba(255,255,255,0.04);
        padding: 18px 0;
        backdrop-filter: blur(12px);
        position: relative;
        z-index: 10;
    }

    nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    /* Multicolor pastel outline using dual-background trick */
    nav a {
        position: relative;
        color: var(--pastel-pink);
        text-decoration: none;
        font-size: 16px;
        font-weight: 700;
        padding: 10px 22px;
        border-radius: 18px;
        transition: all 0.28s ease;
        cursor: pointer;
        display: inline-block;
        background: linear-gradient(rgba(255,255,255,0.02), rgba(255,255,255,0.02)) padding-box,
                    conic-gradient(from 180deg, var(--pastel-pink), var(--pastel-lavender), var(--pastel-mint), var(--pastel-sky), var(--pastel-peach), var(--pastel-pink)) border-box;
        border: 2px solid transparent;
        -webkit-backdrop-filter: blur(2px);
        backdrop-filter: blur(2px);
    }

    /* Subtle inner fill and shadow on hover */
    nav a:hover {
        color: var(--nav-fg);
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(0,0,0,0.45), 0 6px 18px rgba(0,0,0,0.25);
        background: linear-gradient(rgba(255,255,255,0.06), rgba(255,255,255,0.06)) padding-box,
                    conic-gradient(from 180deg, var(--pastel-pink), var(--pastel-lavender), var(--pastel-mint), var(--pastel-sky), var(--pastel-peach), var(--pastel-pink)) border-box;
    }

    /* Active link gets a brighter inner fill */
    nav a.active {
        color: var(--nav-fg);
        background: linear-gradient(rgba(255,255,255,0.10), rgba(255,255,255,0.10)) padding-box,
                    conic-gradient(from 180deg, var(--pastel-pink), var(--pastel-lavender), var(--pastel-mint), var(--pastel-sky), var(--pastel-peach), var(--pastel-pink)) border-box;
        box-shadow: 0 14px 34px rgba(0,0,0,0.5);
    }

    /* Make outlines slightly thicker on larger screens */
    @media (min-width: 1200px) {
        nav a { border-width: 3px; padding: 12px 26px; }
    }

    @media (max-width: 768px) {
        nav a {
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 20px;
        }

        nav ul {
            gap: 16px;
        }
    }
</style>

<script>
    // Set active navigation link based on current page
    function setActiveNavLink() {
        const links = document.querySelectorAll('nav a.nav-link');
        const currentPage = window.location.pathname.split('/').pop() || 'home.html';
        
        links.forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }
    
    // Call on page load
    document.addEventListener('DOMContentLoaded', setActiveNavLink);
</script>
