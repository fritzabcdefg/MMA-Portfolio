<style>
    /* Navigation Menu */
    nav {
        background: rgba(255, 240, 200, 0.8);
        border-bottom: 4px dotted #d4845c;
        padding: 25px 0;
        box-shadow: 0 4px 15px rgba(212, 132, 92, 0.2);
        backdrop-filter: blur(10px);
        position: relative;
        z-index: 10;
    }

    nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 25px;
        flex-wrap: wrap;
    }

    nav a {
        color: #d4845c;
        text-decoration: none;
        font-size: 18px;
        font-weight: bold;
        padding: 12px 28px;
        border: 3px solid #d4845c;
        border-radius: 30px;
        transition: all 0.4s ease;
        cursor: pointer;
        text-shadow: none;
        display: inline-block;
        background: rgba(255, 255, 255, 0.5);
    }

    nav a:hover {
        background: linear-gradient(135deg, #ff9d5c 0%, #ffb347 100%);
        color: #fff;
        border-color: #ff9d5c;
        transform: rotate(-2deg) scale(1.08);
        box-shadow: 0 8px 20px rgba(255, 157, 92, 0.4);
    }

    nav a.active {
        background: linear-gradient(135deg, #ff7b54 0%, #ff9d5c 100%);
        color: #fff;
        border-color: #ff7b54;
        box-shadow: 0 8px 25px rgba(255, 123, 84, 0.5);
    }

    @media (max-width: 768px) {
        nav a {
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 20px;
        }

        nav ul {
            gap: 15px;
        }
    }
</style>

<script>
    // Set active navigation link based on current page
    function setActiveNavLink() {
        const links = document.querySelectorAll('nav a.nav-link');
        const currentPage = window.location.pathname.split('/').pop() || 'home.html';
        
        links.forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }
    
    // Call on page load
    document.addEventListener('DOMContentLoaded', setActiveNavLink);
</script>
