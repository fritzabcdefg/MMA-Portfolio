<style>
    :root {
        --pastel-pink: #f4c2c2;
        --pastel-lavender: #cdb4db;
        --pastel-mint: #c8f7d6;
        --pastel-peach: #ffd7c2;
        --pastel-sky: #cfe9ff;
        --nav-bg: rgba(8,8,12,0.88);
        --nav-fg: rgba(255,255,255,0.95);
    }

    /* Navigation Menu Base */
    nav {
        background: var(--nav-bg);
        border-bottom: 1px solid rgba(255,255,255,0.04);
        padding: 18px 0;
        backdrop-filter: blur(12px);
        position: relative;
        z-index: 10;
    }

    nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    nav a {
        position: relative;
        color: var(--pastel-pink);
        text-decoration: none;
        font-size: 16px;
        font-weight: 700;
        padding: 10px 22px;
        border-radius: 18px;
        transition: all 0.28s ease;
        cursor: pointer;
        display: inline-block;
        background: transparent;
        border: 2px solid rgba(244,194,194,0.45);
        box-shadow: none;
    }

    nav a:hover,
    nav a.active {
        color: #100a14;
        background: var(--pastel-pink);
        border-color: transparent;
        transform: translateY(-3px);
        box-shadow: 0 10px 22px rgba(244,194,194,0.25);
        animation: navPulse 10s ease-in-out infinite alternate;
    }

    @keyframes navPulse {
        0% { background: #f4c2c2; box-shadow: 0 10px 22px rgba(244,194,194,0.25); }
        25% { background: #ffd7c2; box-shadow: 0 10px 24px rgba(255,215,200,0.3); }
        50% { background: #cfe9ff; box-shadow: 0 10px 24px rgba(207,233,255,0.3); }
        75% { background: #c8f7d6; box-shadow: 0 10px 24px rgba(200,247,214,0.3); }
        100% { background: #f4c2c2; box-shadow: 0 10px 22px rgba(244,194,194,0.25); }
    }

    /* --- 👽 ALIEN & 📺 TV ANTENNA DECORATIONS --- */
    
    /* 3D Animation: Space Alien Antenna Vibe */
    nav a.nav-3d::before {
        content: "┵👽┲";
        position: absolute;
        top: -12px;
        left: 50%;
        transform: translateX(-50%) scale(0);
        font-size: 11px;
        color: var(--pastel-sky);
        letter-spacing: -0.5px;
        transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        opacity: 0;
        pointer-events: none;
    }
    nav a.nav-3d:hover::before,
    nav a.nav-3d.active::before {
        top: -21px;
        transform: translateX(-50%) scale(1);
        opacity: 1;
    }

    /* Rotoscope Animation: Retro TV Rabbit Ear Antennas */
    nav a.nav-roto::before {
        content: "＼／";
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%) scale(0);
        font-size: 12px;
        font-weight: 900;
        color: var(--pastel-peach);
        transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        opacity: 0;
        pointer-events: none;
    }
    nav a.nav-roto:hover::before,
    nav a.nav-roto.active::before {
        top: -16px;
        transform: translateX(-50%) scale(1);
        opacity: 1;
    }

    /* --- RESPONSIVE BOUNDARIES --- */
    @media (min-width: 1200px) {
        nav a { border-width: 3px; padding: 12px 26px; }
    }

    @media (max-width: 768px) {
        nav a {
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 20px;
        }
        nav ul {
            gap: 16px;
        }
        /* Slightly adjust antenna spacing on mobile devices */
        nav a.nav-3d:hover::before, nav a.nav-3d.active::before { top: -19px; }
        nav a.nav-roto:hover::before, nav a.nav-roto.active::before { top: -14px; }
    }

    /* --- SPACE THEME ADJUSTMENTS --- */
    body.theme-space nav {
        background: rgba(10, 5, 20, 0.75);
        border-bottom: 1px solid rgba(207, 233, 255, 0.2);
        backdrop-filter: blur(20px);
    }
    body.theme-space nav a {
        border-color: rgba(207, 233, 255, 0.3);
        border-radius: 30px; /* Futuristic pill shape */
    }

    /* --- RETRO THEME ADJUSTMENTS --- */
    body.theme-retro nav {
        background: #0d0214;
        border-bottom: 3px dashed var(--pastel-pink);
    }
    body.theme-retro nav a {
        border: 2px solid var(--pastel-mint);
        border-radius: 0px; /* Flat, blocky retro arcade corners */
        font-family: 'Courier New', Courier, monospace;
        text-shadow: 2px 2px 0px #000;
    }
    body.theme-retro nav a:hover,
    body.theme-retro nav a.active {
        background: var(--pastel-mint) !important;
        color: #000 !important;
        transform: translate(-2px, -2px);
        box-shadow: 4px 4px 0px var(--pastel-pink); /* Hard retro drop shadow */
    }
    /* Adjust antenna colors specifically to adapt inside retro context */
    body.theme-retro nav a.nav-roto::before {
        color: var(--pastel-mint);
        font-family: 'Segoe UI', sans-serif; /* Keep clear shape geometry */
    }
</style>

<script>
    function updateActiveNavigation() {
        const links = document.querySelectorAll('nav a.nav-link');
        const currentFileName = window.location.pathname.split('/').pop() || 'home.html';
        
        links.forEach(link => {
            if (link.getAttribute('href') === currentFileName) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }
    document.addEventListener('DOMContentLoaded', updateActiveNavigation);
</script>
